# CI for nxusKit-examples (public mirror)
#
# Minimal lint and format checks. Full validation (leak gate, staleness,
# difficulty drift, Go vet with SDK) runs on the internal repo before publish.
#
# Path filters: Jobs skip when their relevant files haven't changed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: '1.26'

jobs:

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      data: ${{ steps.filter.outputs.data }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'examples/**/*.rs'
            go:
              - 'examples/**/*.go'
            python:
              - 'examples/**/*.py'
              - 'scripts/**/*.py'
            data:
              - 'examples/**/*.json'
              - 'examples/**/*.csv'
            ci:
              - '.github/workflows/ci.yml'

  # ── Rust: format ─────────────────────────────────────────────────

  fmt-rust:
    name: Format (Rust)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check Rust formatting
        run: |
          mapfile -t RS < <(find examples \( -path '*/target/*' -o -path '*/.git/*' \) -prune -o -name '*.rs' ! -path '*/riffer/shared/testdata/generate_fixtures.rs' -print)
          if [ ${#RS[@]} -eq 0 ]; then
            echo "No Rust sources under examples/."
            exit 0
          fi
          rustfmt --edition 2024 --check "${RS[@]}"

  # ── Go: format ───────────────────────────────────────────────────

  fmt-go:
    name: Format (Go)
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Check Go formatting
        run: |
          UNFORMATTED=$(gofmt -l $(find examples -name '*.go' -not -path '*/vendor/*') 2>/dev/null)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Go files not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

  # ── Python: lint ─────────────────────────────────────────────────

  lint-python:
    name: Lint (Python)
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Check Python files
        run: |
          PY_FILES=$(find examples -name "*.py" 2>/dev/null)
          if [ -z "$PY_FILES" ]; then
            echo "No Python files found — skipping."
            exit 0
          fi
          ruff check examples/
          ruff format --check examples/

  # ── Data files: JSON/CSV lint ────────────────────────────────────

  lint-data:
    name: Lint (Data Files)
    needs: changes
    if: needs.changes.outputs.data == 'true' || needs.changes.outputs.ci == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint JSON and CSV data files
        run: |
          if [ -f scripts/lint-example-data.sh ]; then
            chmod +x scripts/lint-example-data.sh
            scripts/lint-example-data.sh
          else
            echo "No data lint script found — skipping."
          fi
